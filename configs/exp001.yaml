# NLP / LLM baseline config — RTX 3090 24GB
slug: nvidia-nemotron-model-reasoning-challenge
target: target
id_col: id
task: classification
metric: roc_auc

cv:
  kind: stratified
  n_splits: 5
  seed: 42

text:
  col: text
  max_length: 512

train:
  base_model: microsoft/deberta-v3-large
  batch_size: 8
  grad_accum: 4
  precision: bf16-mixed
  lr: 2.0e-5
  epochs: 3
  optimizer: adamw
  scheduler: linear
  warmup_ratio: 0.1
  weight_decay: 0.01

# QLoRA で 7B-13B fine-tune したい場合
llm:
  enabled: false
  base_model: Qwen/Qwen2.5-7B
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  load_in_4bit: true

ensemble:
  multi_seed: 5
