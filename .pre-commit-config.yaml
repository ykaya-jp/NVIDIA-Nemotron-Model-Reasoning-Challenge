repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(notebooks/|submissions/|docs/research_kernels/|docs/discussion/)
      - id: ruff-format
        exclude: ^(notebooks/|submissions/|docs/research_kernels/|docs/discussion/)
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # Raised from 1024 to 8192 to allow the verifier-backed SFT
        # data (~5 MB) to live in the repo so Colab can fetch it via
        # the GitHub clone instead of a separate Kaggle Dataset attach.
        args: [--maxkb=8192]
